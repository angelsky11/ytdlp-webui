version: '3.8'

services:
  ytdlp-webui:
    image: angelsky11/ytdlp-webui:latest
    ports:
      - "58888:58888"
    volumes:
      # 配置文件持久化 - 包含用户设置和配置
      - ./config:/config
      # 下载文件持久化
      - ./downloads:/downloads
    environment:
      - DOWNLOAD_DIR=/downloads
      - CONFIG_DIR=/config
      - PORT=58888
    restart: unless-stopped
